<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 SlotDB</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg: #f5f3ef;
  --bg2: #eeeae3;
  --white: #ffffff;
  --card: #ffffff;
  --border: #e8e2d8;
  --border2: #d8d0c4;

  --tx: #2d2720;
  --tx2: #6b5e52;
  --tx3: #9e9085;
  --tx4: #c4bbb0;

  /* provider pastels */
  --hk-bg: #fff0eb; --hk: #e85c30; --hk-soft: #ffd8cc;
  --nl-bg: #f3eeff; --nl: #7c4fd0; --nl-soft: #dfd0ff;
  --elk-bg: #e8f9f7; --elk: #1aad9a; --elk-soft: #b8ede8;
  --png-bg: #edfff3; --png: #1ab868; --png-soft: #b8f0d0;
  --sl-bg:  #fff0f3; --sl:  #e83058; --sl-soft: #ffc8d4;

  /* accents */
  --peach: #ff8c5a;
  --mint:  #34c9a8;
  --sky:   #5ab4ff;
  --lilac: #a07ee8;
  --rose:  #f06080;
  --yellow:#f5c842;

  --r-sm: 10px;
  --r: 14px;
  --r-lg: 20px;
  --r-xl: 28px;

  --shadow: 0 2px 12px rgba(45,39,32,.07);
  --shadow-lg: 0 8px 32px rgba(45,39,32,.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--tx); font-family: 'Nunito', sans-serif; font-size: 13px; height: 100vh; display: flex; overflow: hidden; }

/* ── SIDEBAR ── */
aside {
  width: 220px; min-width: 220px;
  background: var(--white);
  border-right: 1.5px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 10;
  box-shadow: 2px 0 16px rgba(45,39,32,.04);
}
.logo {
  padding: 22px 18px 16px;
  border-bottom: 1.5px solid var(--border);
}
.logo-inner { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 38px; height: 38px; border-radius: 12px;
  background: linear-gradient(135deg, #ff9a6c, #f06080);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; box-shadow: 0 4px 12px rgba(240,96,128,.3);
}
.logo h1 { font-size: 1.1rem; font-weight: 900; color: var(--tx); }
.logo span { display: block; font-size: 10px; color: var(--tx3); font-weight: 600; margin-top: 1px; }

.nav-sec { padding: 16px 16px 6px; font-size: 10px; font-weight: 800; color: var(--tx4); text-transform: uppercase; letter-spacing: 1.5px; }
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; margin: 2px 10px;
  border-radius: var(--r-sm); cursor: pointer;
  color: var(--tx2); font-size: 12.5px; font-weight: 600;
  transition: all .18s; border: none; background: none;
}
.nav-btn:hover { background: var(--bg); color: var(--tx); }
.nav-btn.on { background: var(--bg); color: var(--tx); font-weight: 800; }
.nav-btn.on .nav-pill { opacity: 1; transform: scale(1); }
.nav-pill {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  opacity: .5; transform: scale(.8); transition: all .18s;
}
.p0{background:var(--yellow)}.p1{background:var(--hk)}.p2{background:var(--nl)}
.p3{background:var(--elk)}.p4{background:var(--png)}.p5{background:var(--sl)}
aside footer {
  margin-top: auto; padding: 14px 16px;
  border-top: 1.5px solid var(--border);
  font-size: 10px; color: var(--tx4); font-weight: 600;
}

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* topbar */
.topbar {
  padding: 14px 24px; background: var(--white);
  border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.topbar h2 { font-size: .95rem; font-weight: 900; flex: 1; color: var(--tx); }
.search { position: relative; }
.search input {
  background: var(--bg); border: 1.5px solid var(--border);
  color: var(--tx); padding: 8px 12px 8px 32px;
  font-family: 'Nunito', sans-serif; font-size: 12.5px; font-weight: 600;
  border-radius: 50px; outline: none; width: 200px;
  transition: all .2s;
}
.search input:focus { border-color: var(--peach); background: var(--white); box-shadow: 0 0 0 3px rgba(255,140,90,.12); }
.search input::placeholder { color: var(--tx4); }
.search::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; pointer-events: none; }

.tbtn {
  padding: 8px 14px; border-radius: 50px;
  font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .18s;
  border: 1.5px solid var(--border2); color: var(--tx2); background: var(--white);
}
.tbtn:hover { border-color: var(--tx3); color: var(--tx); }
.tbtn-add {
  background: linear-gradient(135deg, #ff9a6c, #f06080);
  color: #fff; border: none;
  box-shadow: 0 4px 14px rgba(240,96,128,.35);
}
.tbtn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,96,128,.45); color: #fff; }
.tbtn-csv { border-color: var(--mint); color: var(--mint); }
.tbtn-csv:hover { background: var(--elk-bg); }

/* pages */
.pages { flex: 1; overflow: hidden; display: flex; }
.page { display: none; flex: 1; overflow-y: auto; padding: 20px 24px 48px; }
.page.on { display: block; }

/* stats */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.stat {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  box-shadow: var(--shadow);
}
.stat .n { font-size: 1.8rem; font-weight: 900; line-height: 1; }
.stat .l { font-size: 10px; color: var(--tx3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
.s0 .n { color: var(--peach); } .s1 .n { color: var(--mint); }
.s2 .n { color: var(--lilac); } .s3 .n { color: var(--rose); }

/* table card */
.tcard {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); box-shadow: var(--shadow); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { background: var(--bg); border-bottom: 1.5px solid var(--border); }
th {
  padding: 11px 12px; color: var(--tx3); font-size: 10px;
  text-transform: uppercase; letter-spacing: 1.5px; text-align: left;
  cursor: pointer; white-space: nowrap; font-weight: 800;
}
th:hover { color: var(--tx2); }
tbody tr { border-bottom: 1px solid var(--bg); cursor: pointer; transition: background .12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg); }
tbody tr.sel { background: #fff8f0; box-shadow: inset 3px 0 0 var(--peach); }
td { padding: 11px 12px; vertical-align: middle; }

/* cell styles */
.t-thumb {
  width: 48px; height: 32px; border-radius: 8px;
  object-fit: cover; background: var(--bg2); display: block;
}
.t-name { font-size: 13px; font-weight: 800; color: var(--tx); }
.t-sub { font-size: 10px; color: var(--tx3); font-weight: 600; margin-top: 2px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 50px; font-size: 10px; font-weight: 800;
  white-space: nowrap; letter-spacing: .3px;
}
.b-hk { background: var(--hk-bg); color: var(--hk); }
.b-nl { background: var(--nl-bg); color: var(--nl); }
.b-elk { background: var(--elk-bg); color: var(--elk); }
.b-png { background: var(--png-bg); color: var(--png); }
.b-sl  { background: var(--sl-bg);  color: var(--sl); }

.conn {
  display: inline-flex; padding: 3px 8px; border-radius: 50px;
  font-size: 10px; font-weight: 700; white-space: nowrap;
}
.cw { background: #eeeaff; color: var(--lilac); }
.cc { background: #fff8e0; color: #c89820; }
.cs { background: var(--sl-bg); color: var(--sl); }
.cl { background: var(--elk-bg); color: var(--elk); }
.cm { background: var(--hk-bg); color: var(--hk); }

.ftag {
  display: inline-flex; padding: 2px 7px; border-radius: 50px;
  font-size: 10px; font-weight: 700;
  background: #fef3e8; color: var(--peach); white-space: nowrap;
}
.ftag.off { background: var(--bg); color: var(--tx4); }

.rtp { color: var(--mint); font-weight: 800; }
.mxw { color: var(--rose); font-weight: 800; }
.grd { color: var(--lilac); font-weight: 700; }

.vbadge { padding: 3px 9px; border-radius: 50px; font-size: 10px; font-weight: 800; }
.vh { background: #fff0f0; color: var(--rose); }
.vm { background: #fff8e8; color: #d08820; }
.ve { background: #fce8f0; color: #c02850; }

.act button {
  background: var(--bg); border: 1.5px solid var(--border);
  color: var(--tx3); width: 26px; height: 26px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 11px; transition: all .15s; font-family: 'Nunito',sans-serif;
}
.act button:hover { border-color: var(--peach); color: var(--peach); background: #fff5f0; }
.act .d:hover { border-color: var(--rose); color: var(--rose); background: var(--sl-bg); }

.mdiv td { padding: 16px 12px 4px; }
.mlbl {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 2px; color: var(--tx4);
}
.empty { text-align: center; padding: 60px 20px; color: var(--tx3); }
.empty .ei { font-size: 2.5rem; margin-bottom: 8px; }
.empty p { font-weight: 700; }

/* ── SIDE PANEL ── */
.sp {
  position: fixed; right: 0; top: 0; bottom: 0; width: 480px;
  background: var(--white); border-left: 1.5px solid var(--border);
  z-index: 200; transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: -8px 0 40px rgba(45,39,32,.1);
}
.sp.open { transform: translateX(0); }
.sp-head {
  padding: 14px 16px; border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  background: var(--white);
}
.sp-head-title { font-size: 11px; font-weight: 800; color: var(--tx3); text-transform: uppercase; letter-spacing: 1.5px; }
.sp-x {
  background: var(--bg); border: 1.5px solid var(--border);
  color: var(--tx3); width: 30px; height: 30px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all .15s; font-family: 'Nunito',sans-serif;
}
.sp-x:hover { background: var(--sl-bg); border-color: var(--rose); color: var(--rose); }
.sp-body { flex: 1; overflow-y: auto; }

/* hero */
.sp-hero { position: relative; height: 190px; flex-shrink: 0; overflow: hidden; }
.sp-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sp-hero-fallback {
  width: 100%; height: 100%; display: none; align-items: center; justify-content: center;
  font-size: 4rem; background: linear-gradient(135deg, #fff4ef, #fce8f0);
}
.sp-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,.3) 40%, transparent 100%); }
.sp-hero-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 18px; }
.sp-hero-name { font-size: 1.25rem; font-weight: 900; color: var(--tx); line-height: 1.15; }
.sp-hero-sub { margin-top: 5px; display: flex; gap: 6px; flex-wrap: wrap; }

/* quick strip */
.sp-strip {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 10px; padding: 14px 16px;
  border-bottom: 1.5px solid var(--border); flex-shrink: 0;
}
.sp-strip-item {
  background: var(--bg); border-radius: var(--r-sm);
  padding: 10px 10px; text-align: center;
}
.sp-strip-item .sv { font-size: 14px; font-weight: 900; line-height: 1; }
.sp-strip-item .sk { font-size: 9px; color: var(--tx3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

/* tabs */
.sp-tabs {
  display: flex; border-bottom: 1.5px solid var(--border);
  flex-shrink: 0; padding: 0 16px; gap: 2px; background: var(--white);
}
.sp-tab {
  padding: 11px 10px; font-size: 12px; font-weight: 700; color: var(--tx3);
  cursor: pointer; border-bottom: 2.5px solid transparent;
  transition: all .15s; white-space: nowrap;
}
.sp-tab:hover { color: var(--tx2); }
.sp-tab.on { color: var(--peach); border-bottom-color: var(--peach); font-weight: 800; }
.sp-pane { display: none; padding: 18px 18px 32px; }
.sp-pane.on { display: block; }

/* overview sections */
.sec { margin-bottom: 20px; }
.sec-h {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--tx3); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.sec-h::before { content: ''; display: block; width: 3px; height: 12px; background: var(--peach); border-radius: 2px; }

.spec-tbl { width: 100%; border-collapse: collapse; }
.spec-tbl tr { border-bottom: 1px solid var(--bg); }
.spec-tbl tr:last-child { border-bottom: none; }
.spec-tbl td { padding: 7px 6px; font-size: 12.5px; }
.spec-tbl td:first-child { color: var(--tx3); font-weight: 700; width: 42%; }
.spec-tbl td:last-child { color: var(--tx); font-weight: 700; }

/* rules */
.rules-body { font-size: 12.5px; line-height: 1.9; color: var(--tx2); font-weight: 500; }
.rules-body h3 {
  font-size: 12px; font-weight: 800; color: var(--tx);
  margin: 18px 0 7px; display: flex; align-items: center; gap: 7px;
}
.rules-body h3::before {
  content: ''; display: block; width: 16px; height: 16px; border-radius: 50%;
  background: var(--bg); border: 2px solid var(--peach); flex-shrink: 0;
}
.rules-body h3:first-child { margin-top: 0; }
.rules-body p { margin-bottom: 8px; }
.rules-body strong { color: var(--tx); font-weight: 800; }
.rules-body em { color: var(--peach); font-style: normal; font-weight: 700; }
.callout {
  background: #fff8f0; border: 1.5px solid #fde0c0;
  border-radius: var(--r-sm); padding: 10px 14px;
  margin: 12px 0; font-size: 12px; color: var(--tx2); line-height: 1.7;
}
.callout.warn { background: var(--sl-bg); border-color: #ffc0cc; color: #c02850; }

/* mech cards */
.mech-list { display: flex; flex-direction: column; gap: 10px; }
.mech-card {
  background: var(--bg); border-radius: var(--r);
  padding: 14px 15px; display: flex; gap: 13px; align-items: flex-start;
  border: 1.5px solid var(--border); transition: border-color .15s;
}
.mech-card:hover { border-color: var(--peach); }
.mech-icon {
  width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0;
  background: var(--white); display: flex; align-items: center;
  justify-content: center; font-size: 1.2rem;
  border: 1.5px solid var(--border); box-shadow: var(--shadow);
}
.mech-name { font-size: 12.5px; font-weight: 800; color: var(--tx); }
.mech-tag {
  display: inline-block; margin: 4px 0; padding: 2px 8px;
  border-radius: 50px; font-size: 10px; font-weight: 700;
  background: var(--nl-bg); color: var(--nl);
}
.mech-desc { font-size: 11.5px; color: var(--tx2); line-height: 1.7; font-weight: 500; margin-top: 3px; }

/* pros/cons */
.pc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pc-box { background: var(--bg); border-radius: var(--r); padding: 14px; border: 1.5px solid var(--border); }
.pc-box.pro { border-top: 3px solid var(--mint); }
.pc-box.con { border-top: 3px solid var(--rose); }
.pc-box h4 { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.pc-box.pro h4 { color: var(--mint); } .pc-box.con h4 { color: var(--rose); }
.pc-box ul { list-style: none; }
.pc-box li { font-size: 11.5px; color: var(--tx2); padding: 4px 0; display: flex; gap: 6px; line-height: 1.55; font-weight: 600; }
.pc-box.pro li::before { content: '✓'; color: var(--mint); font-weight: 900; flex-shrink: 0; }
.pc-box.con li::before { content: '✕'; color: var(--rose); font-weight: 900; flex-shrink: 0; }

/* RTP bars */
.rtp-wrap { display: flex; flex-direction: column; gap: 8px; }
.rtp-row { display: flex; align-items: center; gap: 10px; font-size: 11px; }
.rtp-lbl { color: var(--tx3); font-weight: 700; width: 50px; flex-shrink: 0; }
.rtp-bar-bg { flex: 1; height: 7px; background: var(--bg2); border-radius: 50px; overflow: hidden; }
.rtp-bar-fill { height: 100%; border-radius: 50px; transition: width .5s .1s; }
.rtp-v { font-weight: 800; color: var(--tx); width: 44px; text-align: right; }

.demo-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, #ff9a6c, #f06080);
  color: #fff; padding: 10px 20px; border-radius: 50px;
  font-size: 12.5px; font-weight: 800; text-decoration: none;
  margin-top: 6px; transition: all .18s;
  box-shadow: 0 4px 14px rgba(240,96,128,.3);
}
.demo-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(240,96,128,.45); }

/* ── PROVIDER PAGE ── */
.prov-banner {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); padding: 18px 20px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow);
}
.prov-stripe { width: 5px; height: 44px; border-radius: 50px; flex-shrink: 0; }
.prov-name { font-size: 1.15rem; font-weight: 900; color: var(--tx); }
.prov-info { font-size: 11px; color: var(--tx3); font-weight: 600; margin-top: 3px; }
.prov-info a { color: inherit; text-decoration: none; }
.month-tabs { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
.mtab {
  padding: 6px 12px; background: var(--bg); border: 1.5px solid var(--border);
  color: var(--tx3); border-radius: 50px; cursor: pointer;
  font-size: 11px; font-weight: 700; font-family: 'Nunito',sans-serif;
  transition: all .15s;
}
.mtab.on, .mtab:hover { border-color: var(--peach); color: var(--peach); background: #fff5f0; }
.pstats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
.pnote {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  font-size: 12px; line-height: 1.85; color: var(--tx2);
  font-weight: 500; margin-top: 16px; box-shadow: var(--shadow);
}
.pnote strong { color: var(--tx); font-weight: 800; }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(45,39,32,.4); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
.overlay.open { display: flex; }
.modal {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r-xl); padding: 28px; width: 660px;
  max-width: 95vw; max-height: 88vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal h2 { font-size: 1rem; font-weight: 900; margin-bottom: 18px; }
.fg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg.full { grid-column: 1/-1; }
.fg label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--tx3); }
.fg input, .fg select, .fg textarea {
  background: var(--bg); border: 1.5px solid var(--border);
  color: var(--tx); padding: 8px 12px;
  font-family: 'Nunito', sans-serif; font-size: 12.5px; font-weight: 600;
  border-radius: var(--r-sm); outline: none; transition: all .2s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--peach); background: var(--white); box-shadow: 0 0 0 3px rgba(255,140,90,.1); }
.fg select option { background: var(--white); }
.fg textarea { resize: vertical; min-height: 65px; }
.chks { display: flex; flex-wrap: wrap; gap: 8px; }
.chks label { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; color: var(--tx2); font-weight: 600; }
.chks input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--peach); }
.modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
.btn-cancel { background: var(--bg); border: 1.5px solid var(--border); color: var(--tx2); padding: 9px 18px; font-family: 'Nunito',sans-serif; font-size: 12.5px; font-weight: 700; border-radius: 50px; cursor: pointer; transition: all .15s; }
.btn-cancel:hover { border-color: var(--tx3); }

  const ft=ftAll.map(f=>`<span class="ftag${(g.feat||[]).includes(f)?'':' off'}">${f}</span>`).join('');
  return`<tr data-id="${g.id}" style="animation-delay:${i*.022}s" class="${g.id===selId?'sel':''}" onclick="openPanel(${g.id})">
    <td>${imgWithFallback(g.img, g.name, g.provider, 't-thumb')}</td>
    <td><div class="t-name">${g.name}</div><div class="t-sub">${g.sum?g.sum.slice(0,55)+'…':''}</div></td>
    <td><span class="badge ${bcl(g.provider)}">${g.provider}</span></td>
    <td style="color:var(--tx3);font-size:11px;font-weight:700;white-space:nowrap">${fd(g.releaseDate)}</td>
    <td>${g.conn?`<span class="conn ${ccl(g.conn)}">${g.conn}</span>`:'—'}</td>
    <td class="grd">${g.grid||'—'}</td>
    <td class="rtp">${g.rtp?g.rtp+'%':'—'}</td>
    <td class="mxw">${g.maxwin?'x'+Number(g.maxwin).toLocaleString():'—'}</td>
    <td>${g.vol?`<span class="vbadge ${vcl(g.vol)}">${g.vol}</span>`:'—'}</td>
    <td><div style="display:flex;gap:4px;flex-wrap:wrap">${ft}</div></td>
    <td class="act" onclick="event.stopPropagation()"><div style="display:flex;gap:4px">
      <button onclick="openModal(${g.id})">✏️</button>
      <button class="d" onclick="delG(${g.id})">🗑️</button>
    </div></td>
  </tr>`;
}

function renderMain(){
  const list=filt();
  const tb=document.getElementById('tb');
  const empty=document.getElementById('empty');
  if(!list.length){tb.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  let html='',last='';
  list.forEach((g,i)=>{
    const m=ml(g.releaseDate);
    if(m!==last){last=m;html+=`<tr class="mdiv"><td colspan="11" style="padding:14px 14px 4px"><span class="mlbl">📅 ${m}</span></td></tr>`}
    html+=rowHtml(g,i);
  });
  tb.innerHTML=html;
  const now=new Date();
  const mo=G.filter(g=>{const d=new Date(g.releaseDate);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()}).length;
  const mws=G.filter(g=>g.maxwin).map(g=>parseInt(g.maxwin));
  document.getElementById('st-tot').textContent=G.length;
  document.getElementById('st-mo').textContent=mo;
  document.getElementById('st-mw').textContent='x'+(mws.length?Math.round(mws.reduce((a,b)=>a+b,0)/mws.length).toLocaleString():'—');
}

function sort(k){ss.k===k?ss.d*=-1:(ss.k=k,ss.d=-1);renderMain()}

// ── SIDE PANEL ──
function openPanel(id){
  const g=G.find(x=>x.id===id);if(!g)return;
  selId=id;
  document.querySelectorAll('tbody tr[data-id]').forEach(r=>r.classList.toggle('sel',+r.dataset.id===id));
  const pi=PROV[g.provider]||{color:'var(--peach)',bc:'b-hk',stripe:'var(--peach)'};
  const rtpRows=(g.rtps||[{label:'標準',val:parseFloat(g.rtp)||96}]).map(r=>{
    const mn=50,mx=99,w=Math.max(0,Math.min(100,(r.val-mn)/(mx-mn)*100));
    const c=r.val>=96?'var(--mint)':r.val>=93?'var(--yellow)':'var(--rose)';
    return`<div class="rtp-row">
      <span class="rtp-lbl">${r.label}</span>
      <div class="rtp-bar-bg"><div class="rtp-bar-fill" style="width:${w}%;background:${c}"></div></div>
      <span class="rtp-v">${r.val}%</span>
    </div>`;
  }).join('');
  const mechHtml=(g.mechs||[]).map(m=>`
    <div class="mech-card">
      <div class="mech-icon">${m.icon}</div>
      <div>
        <div class="mech-name">${m.name}</div>
        ${m.type?`<span class="mech-tag">${m.type}</span>`:''}
        <div class="mech-desc">${m.desc||''}</div>
      </div>
    </div>`).join('');
  const prosHtml=(g.pros||[]).map(p=>`<li>${p}</li>`).join('');
  const consHtml=(g.cons||[]).map(c=>`<li>${c}</li>`).join('');

  document.getElementById('sp-body').innerHTML=`
    <div class="sp-hero">
      ${heroImg(g.img, g.name, g.provider)}
      <div class="sp-hero-overlay"></div>
      <div class="sp-hero-info">
        <div class="sp-hero-name">${g.name}</div>
        <div class="sp-hero-sub">
          <span class="badge ${pi.bc}">${g.provider}</span>
          ${g.vol?`<span class="vbadge ${vcl(g.vol)}">${g.vol}</span>`:''}
        </div>
      </div>
    </div>
    <div class="sp-strip">
      <div class="sp-strip-item"><div class="sv rtp">${g.rtp?g.rtp+'%':'—'}</div><div class="sk">RTP</div></div>
      <div class="sp-strip-item"><div class="sv mxw">${g.maxwin?'x'+Number(g.maxwin).toLocaleString():'—'}</div><div class="sk">Max Win</div></div>
      <div class="sp-strip-item"><div class="sv grd">${g.grid||'—'}</div><div class="sk">盤面</div></div>
      <div class="sp-strip-item"><div class="sv" style="color:var(--tx2);font-size:11px;font-weight:800">${g.bet?g.bet:'—'}</div><div class="sk">下注範圍</div></div>
    </div>
    <div class="sp-tabs">
      <div class="sp-tab on" onclick="stab(this,'pn-ov')">概覽</div>
      <div class="sp-tab" onclick="stab(this,'pn-rules')">完整規則</div>
      <div class="sp-tab" onclick="stab(this,'pn-mechs')">機制說明</div>
      <div class="sp-tab" onclick="stab(this,'pn-eval')">評估</div>
    </div>

    <div id="pn-ov" class="sp-pane on">
      <div class="sec"><div class="sec-h">基本規格</div>
        <table class="spec-tbl">
          <tr><td>廠商</td><td><span class="badge ${pi.bc}">${g.provider}</span></td></tr>
          <tr><td>發布日期</td><td>${fd(g.releaseDate)}</td></tr>
          <tr><td>連線類型</td><td>${g.conn?`<span class="conn ${ccl(g.conn)}">${g.conn}</span>`:'—'}</td></tr>
          <tr><td>盤面</td><td><span class="grd">${g.grid||'—'}</span></td></tr>
          <tr><td>波動度</td><td>${g.vol?`<span class="vbadge ${vcl(g.vol)}">${g.vol}</span>`:'—'}</td></tr>
          <tr><td>下注範圍</td><td style="font-weight:800">${g.bet||'—'}</td></tr>
          <tr><td>Max Win</td><td class="mxw">${g.maxwin?'x'+Number(g.maxwin).toLocaleString():'—'}</td></tr>
          <tr><td>Hit Freq</td><td style="font-weight:700;color:var(--tx2)">${g.hitFreq||'—'}</td></tr>
          <tr><td>BWB Score</td><td>${g.bwbScore&&g.bwbScore!='N/A'?`<span style="display:inline-flex;align-items:center;gap:4px;background:${+g.bwbScore>=9?'#e8fff5':+g.bwbScore>=7?'#fff8e8':'#fff0f0'};border:1.5px solid ${+g.bwbScore>=9?'var(--mint)':+g.bwbScore>=7?'var(--yellow)':'var(--rose)'};color:${+g.bwbScore>=9?'var(--mint)':+g.bwbScore>=7?'#c89820':'var(--rose)'};font-weight:900;font-size:13px;padding:2px 10px;border-radius:50px">${g.bwbScore}<span style="font-size:10px;font-weight:600;opacity:.7">/10</span></span>`:'<span style="color:var(--tx4);font-weight:700">N/A</span>'}</td></tr>
        </table>
      </div>
      <div class="sec"><div class="sec-h">功能標籤</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${(g.feat||[]).map(f=>`<span class="ftag">${f}</span>`).join('')}</div>
      </div>
      <div class="sec"><div class="sec-h">主題摘要</div>
        <div style="font-size:12.5px;line-height:1.8;color:var(--tx2);font-weight:500">${g.sum||'—'}</div>
      </div>
      <div class="sec"><div class="sec-h">RTP 版本比較</div>
        <div class="rtp-wrap">${rtpRows}</div>
      </div>
      ${g.bwbVerdict?`<div class="sec"><div class="sec-h">BWB Verdict</div><div style="font-size:12px;line-height:1.8;color:var(--tx2);font-style:italic;font-weight:600;background:var(--bg);border-radius:var(--r-sm);padding:10px 12px;border-left:3px solid var(--peach)">"${g.bwbVerdict}"</div></div>`:''}
      ${g.link?`<a class="demo-btn" href="${g.link}" target="_blank">🎮 Demo / Review →</a>`:''}
    </div>

    <div id="pn-rules" class="sp-pane">
      <div class="rules-body">${g.rules||'<p>規則說明尚未填寫。</p>'}</div>
    </div>

    <div id="pn-mechs" class="sp-pane">
      <div class="sec-h" style="margin-bottom:12px">核心機制卡片</div>
      <div class="mech-list">${mechHtml||'<p style="color:var(--tx3);font-size:12px;font-weight:600">機制說明尚未填寫。</p>'}</div>
    </div>

    <div id="pn-eval" class="sp-pane">
      <div class="sec-h" style="margin-bottom:12px">優缺點分析</div>
      <div class="pc-grid">
        <div class="pc-box pro"><h4>✓ 優點</h4><ul>${prosHtml||'<li>暫無資料</li>'}</ul></div>
        <div class="pc-box con"><h4>✕ 缺點</h4><ul>${consHtml||'<li>暫無資料</li>'}</ul></div>
      </div>
    </div>
  `;
  document.getElementById('sp').classList.add('open');
}

function closePanel(){
  document.getElementById('sp').classList.remove('open');
  selId=null;
  document.querySelectorAll('tbody tr.sel').forEach(r=>r.classList.remove('sel'));
}
function stab(el,id){
  document.querySelectorAll('.sp-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.sp-pane').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(id)?.classList.add('on');
}

// ── PROVIDER PAGES ──
function renderProv(pname){
  const key=pk(pname);const pi=PROV[pname]||{};const el=document.getElementById('pg-'+key);
  const pG=G.filter(g=>g.provider===pname);
  const months={};pG.forEach(g=>{const m=ml(g.releaseDate)||'未知';(months[m]=months[m]||[]).push(g)});
  const sortedM=Object.keys(months).sort((a,b)=>b.localeCompare(a));
  const now=new Date();
  const moN=pG.filter(g=>{const d=new Date(g.releaseDate);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()}).length;
  const mbtns=sortedM.map((m,i)=>`<button class="mtab${i===0?' on':''}" onclick="filterPM(this,'${key}','${m}')">${m}</button>`).join('');
  function tbl(list){
    if(!list.length)return'<div class="empty"><div class="ei">🔍</div><p>本月無新遊戲</p></div>';
    return`<div class="tcard" style="margin-top:0"><table>
      <thead><tr><th style="width:52px"></th><th>遊戲名稱</th><th>發布日期</th><th>連線</th><th>盤面</th><th>RTP</th><th>Max Win</th><th>波動</th><th>功能</th></tr></thead>
      <tbody>${list.map((g,i)=>{
        const ft=(g.feat||[]).map(f=>`<span class="ftag">${f}</span>`).join('');
        return`<tr style="animation-delay:${i*.03}s;cursor:pointer" onclick="openPanel(${g.id})">
          <td>${imgWithFallback(g.img, g.name, g.provider, 't-thumb')}</td>
          <td><div class="t-name">${g.name}</div><div class="t-sub">${g.sum?g.sum.slice(0,50)+'…':''}</div></td>
          <td style="color:var(--tx3);font-size:11px;font-weight:700;white-space:nowrap">${fd(g.releaseDate)}</td>
          <td>${g.conn?`<span class="conn ${ccl(g.conn)}">${g.conn}</span>`:'—'}</td>
          <td class="grd">${g.grid||'—'}</td>
          <td class="rtp">${g.rtp?g.rtp+'%':'—'}</td>
          <td class="mxw">${g.maxwin?'x'+Number(g.maxwin).toLocaleString():'—'}</td>
          <td>${g.vol?`<span class="vbadge ${vcl(g.vol)}">${g.vol}</span>`:'—'}</td>
          <td><div style="display:flex;gap:4px;flex-wrap:wrap">${ft}</div></td>
        </tr>`}).join('')}
      </tbody></table></div>`;
  }
  el.innerHTML=`
    <div class="prov-banner">
      <div class="prov-stripe" style="background:${pi.stripe||pi.color}"></div>
      <div>
        <div class="prov-name">${pname}</div>
        <div class="prov-info">成立：${pi.founded||'—'} · ${pi.hq||'—'} · <a href="${pi.web||'#'}" target="_blank">${pi.web||''}</a></div>
      </div>
      <div class="month-tabs">${mbtns}</div>
    </div>
    <div class="pstats">
      <div class="stat s0"><div class="n">${pG.length}</div><div class="l">總遊戲</div></div>
      <div class="stat s1"><div class="n">${moN}</div><div class="l">本月新增</div></div>
      <div class="stat s3"><div class="n">${pG.filter(g=>parseInt(g.maxwin)>=10000).length}</div><div class="l">Max Win≥10K</div></div>
    </div>
    <div id="pt-${key}">${tbl(months[sortedM[0]]||[])}</div>
    <div class="pnote"><strong>廠商簡介：</strong><br>${pi.about||'—'}</div>
  `;
  el._m=months;el._t=tbl;
}

function filterPM(btn,key,m){
  const el=document.getElementById('pg-'+key);
  el.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const t=document.getElementById('pt-'+key);
  if(t&&el._t)t.innerHTML=el._t(el._m[m]||[]);
}

function goPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  document.getElementById('nb-'+name).classList.add('on');
  cur=name;
  const titles={all:'全部遊戲 🎮',hacksaw:'Hacksaw Gaming 月報 🧡',nolimit:'NoLimit City 月報 💜',elk:'ELK Studios 月報 💚',playngo:"Play'n GO 月報 🍀",shady:'Shady Lady 月報 🌹'};
  document.getElementById('page-h').textContent=titles[name]||name;
  if(name!=='all'){const pm={hacksaw:'Hacksaw Gaming',nolimit:'NoLimit City',elk:'ELK Studios',playngo:"Play'n GO",shady:'Shady Lady'};renderProv(pm[name])}
  closePanel();
}

// ── MODAL ──
function openModal(id=null){
  eid=id;clearMod();
  document.getElementById('m-title').textContent=id?'✏️ 編輯遊戲':'＋ 新增遊戲 ✨';
  if(id){
    const g=G.find(x=>x.id===id);
    if(g){
      const m={name:g.name,prov:g.provider,date:g.releaseDate,conn:g.conn,grid:g.grid,rtp:g.rtp,mw:g.maxwin,vol:g.vol,bet:g.bet,img:g.img,link:g.link,sum:g.sum,rules:g.rules,
        mechs:g.mechs?JSON.stringify(g.mechs,null,2):'',
        pros:(g.pros||[]).join('\n'),cons:(g.cons||[]).join('\n')};
      Object.entries(m).forEach(([k,v])=>{const el=document.getElementById('m-'+k);if(el)el.value=v||''});
      document.querySelectorAll('.chks input[type=checkbox]').forEach(c=>c.checked=(g.feat||[]).includes(c.value));
    }
  }else{document.getElementById('m-date').value=new Date().toISOString().slice(0,10)}
  document.getElementById('modal-ov').classList.add('open');
}
function closeModal(){document.getElementById('modal-ov').classList.remove('open');eid=null}
function clearMod(){
  ['m-name','m-prov','m-date','m-conn','m-grid','m-rtp','m-mw','m-vol','m-bet','m-img','m-link','m-sum','m-rules','m-mechs','m-pros','m-cons'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  document.querySelectorAll('.chks input[type=checkbox]').forEach(c=>c.checked=false);
}
function saveGame(){
  const name=document.getElementById('m-name').value.trim();
  const prov=document.getElementById('m-prov').value;
  if(!name||!prov){alert('請填寫遊戲名稱和廠商 😊');return}
  let mechs=null;try{const v=document.getElementById('m-mechs').value.trim();if(v)mechs=JSON.parse(v)}catch(e){}
  const d={name,provider:prov,releaseDate:document.getElementById('m-date').value,
    conn:document.getElementById('m-conn').value,grid:document.getElementById('m-grid').value.trim(),
    rtp:document.getElementById('m-rtp').value.trim(),maxwin:document.getElementById('m-mw').value.trim(),
    vol:document.getElementById('m-vol').value,bet:document.getElementById('m-bet').value.trim(),
    img:document.getElementById('m-img').value.trim(),link:document.getElementById('m-link').value.trim(),
    sum:document.getElementById('m-sum').value.trim(),rules:document.getElementById('m-rules').value.trim(),
    mechs,pros:document.getElementById('m-pros').value.split('\n').map(s=>s.trim()).filter(Boolean),
    cons:document.getElementById('m-cons').value.split('\n').map(s=>s.trim()).filter(Boolean),
    feat:[...document.querySelectorAll('.chks input[type=checkbox]:checked')].map(c=>c.value)};
  if(eid){const i=G.findIndex(g=>g.id===eid);if(i!==-1)G[i]={...G[i],...d}}else G.push({id:nid++,...d});
  closeModal();renderMain();
}
function delG(id){if(!confirm('確定刪除？'))return;G=G.filter(g=>g.id!==id);if(selId===id)closePanel();renderMain()}

function exportCSV(){
  const h=['遊戲名稱','廠商','發布日期','連線','盤面','RTP%','Max Win','波動','下注範圍','功能','摘要','連結'];
  const rows=filt().map(g=>[g.name,g.provider,g.releaseDate,g.conn,g.grid,g.rtp,g.maxwin,g.vol,g.bet,(g.feat||[]).join('/'),g.sum,g.link].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[h.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`slotdb-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});
document.getElementById('modal-ov').addEventListener('click',e=>{if(e.target===document.getElementById('modal-ov'))closeModal()});
renderMain();
</script>
